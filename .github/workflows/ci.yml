name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.113 --locked
      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown --no-default-features --features wasm
      - name: Generate JS bindings
        run: |
          mkdir -p dist/wasm
          wasm-bindgen \
            --out-dir dist/wasm \
            --target web \
            target/wasm32-unknown-unknown/release/void_drifter.wasm
          cp dist/index.html dist/index.html 2>/dev/null || true
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev
      - name: Build Linux
        run: cargo build --release
      - name: Package
        run: |
          mkdir -p release
          cp target/release/void_drifter release/void-drifter-linux
          chmod +x release/void-drifter-linux
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: release/void-drifter-linux

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Windows
        run: cargo build --release
      - name: Package
        run: |
          mkdir release
          copy target\release\void_drifter.exe release\void-drifter-windows.exe
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/void-drifter-windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build macOS
        run: cargo build --release
      - name: Package
        run: |
          mkdir -p release
          cp target/release/void_drifter release/void-drifter-macos
          chmod +x release/void-drifter-macos
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/void-drifter-macos

  deploy-gh-pages:
    needs: build-wasm
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-build
          path: dist/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/

  release:
    needs: [build-linux, build-windows, build-macos, build-wasm]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create zip for WASM
        run: |
          cd artifacts/wasm-build
          zip -r ../void-drifter-web.zip .
          cd ../..
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-build/void-drifter-linux
            artifacts/windows-build/void-drifter-windows.exe
            artifacts/macos-build/void-drifter-macos
            artifacts/void-drifter-web.zip

  deploy-itch:
    needs: [build-linux, build-windows, build-macos, build-wasm]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          sudo mv butler /usr/local/bin/
      - name: Deploy Linux to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: butler push artifacts/linux-build/void-drifter-linux neosam/void-drifter:linux
      - name: Deploy Windows to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: butler push artifacts/windows-build/void-drifter-windows.exe neosam/void-drifter:windows
      - name: Deploy macOS to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: butler push artifacts/macos-build/void-drifter-macos neosam/void-drifter:osx
      - name: Deploy WASM to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: butler push artifacts/wasm-build/ neosam/void-drifter:html5
