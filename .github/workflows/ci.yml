name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.113 --locked
      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown --no-default-features --features wasm
      - name: Generate JS bindings
        run: |
          mkdir -p dist/wasm
          wasm-bindgen \
            --out-dir dist/wasm \
            --target web \
            target/wasm32-unknown-unknown/release/void_drifter.wasm
      - name: Copy index.html
        run: cp dist/index.html dist/index.html 2>/dev/null || true
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: dist/

  deploy-gh-pages:
    needs: build-wasm
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-build
          path: dist/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/

  deploy-itch:
    needs: build-wasm
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-build
          path: dist/
      - name: Deploy to itch.io
        uses: josephbuckley/itch-butler@v1
        with:
          butler-api-key: ${{ secrets.BUTLER_API_KEY }}
          itch-username: neosam
          itch-game-name: void-drifter
          channel: html5
          package-path: dist/
